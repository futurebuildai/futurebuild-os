name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image (Verify)
        run: docker build . --file Dockerfile

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        # IMPORTANT: Use create-deployment, NOT apps update --spec
        # apps update --spec is DECLARATIVE and will DELETE any env vars
        # that aren't in the yaml (like JWT_SECRET set in Dashboard).
        # create-deployment triggers a new build/deploy using existing config.
        env:
            APP_ID: ${{ secrets.DO_APP_ID_STAGING }}
        run: |
          doctl apps create-deployment $APP_ID --wait
