name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Deps
        run: npm ci
        working-directory: ./frontend

      # Linting
      - name: Lint Frontend
        run: npm run lint
        working-directory: ./frontend

      - name: Lint Backend
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m
          skip-cache: true 

      # Testing
      - name: Test Frontend
        run: npm run test
        working-directory: ./frontend

      - name: Test Backend
        run: go test -v ./...
