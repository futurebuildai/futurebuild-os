name: futurebuild-staging
region: nyc3
services:
- name: api
  github:
    repo: futurebuildai/futurebuild-repo
    branch: staging
    deploy_on_push: false
  dockerfile_path: Dockerfile
  source_dir: .
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: APP_ENV
    value: staging
    scope: RUN_TIME
  - key: DATABASE_URL
    value: ${db.DATABASE_URL}
    scope: RUN_AND_BUILD_TIME
    type: SECRET

  - key: GCP_SA_JSON_CONTENT
    scope: RUN_TIME
    type: SECRET

  health_check:
    http_path: /health
    initial_delay_seconds: 10
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3
    success_threshold: 1
