# Step 8: Docker Compose for local dev parity
# See PRODUCTION_PLAN.md Section Phase 0

services:
  # API Service
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://fb_user:fb_pass@db:5432/futurebuild?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=dev_secret_keys_should_be_long_and_complex
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Database: Postgres 15 + pgvector
  db:
    image: ankane/pgvector:v0.5.1 # Or any Postgres 15 image with pgvector pre-installed
    environment:
      - POSTGRES_USER=fb_user
      - POSTGRES_PASSWORD=fb_pass
      - POSTGRES_DB=futurebuild
    ports:
      - "5433:5432" # Host mapping 5433 to avoid collision with local PG
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fb_user -d futurebuild"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Asynq
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # MinIO for Object Storage
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server --console-address ":9001" /data
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
